steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-api:latest'
      - '.'
    waitFor: ['-']

  # Step 2: Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-api:$COMMIT_SHA'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-api:latest'
    waitFor: ['build-image']

  # Step 3: Run tests
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-tests'
    args:
      - 'run'
      - '--rm'
      - 'gcr.io/$PROJECT_ID/carbon-footprint-api:$COMMIT_SHA'
      - 'npm'
      - 'run'
      - 'test'
    waitFor: ['build-image']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-to-cloud-run'
    args:
      - run
      - deploy
      - carbon-footprint-api
      - '--image=gcr.io/$PROJECT_ID/carbon-footprint-api:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--allow-unauthenticated'
      - '--set-cloudsql-instances=${_SQL_CONNECTION_NAME}'
      - '--update-env-vars=NODE_ENV=production,COMMIT_SHA=$COMMIT_SHA'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'
      - 'CLOUDSDK_RUN_PLATFORM=managed'
    waitFor: ['run-tests']

  # Step 5: Run smoke tests
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'smoke-tests'
    args:
      - 'run'
      - 'services'
      - 'describe'
      - 'carbon-footprint-api'
      - '--region=us-central1'
      - '--format=value(status.url)'
    waitFor: ['deploy-to-cloud-run']

images:
  - 'gcr.io/$PROJECT_ID/carbon-footprint-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/carbon-footprint-api:latest'

timeout: '3600s'

substitutions:
  _SQL_CONNECTION_NAME: 'your-project-id:us-central1:carbon-postgres'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
onFailure:
  - 'gcloud'
  - 'run'
  - 'rollbacks'
  - 'create'
  - 'carbon-footprint-api'
  - '--region=us-central1'

logsBucket: 'gs://$PROJECT_ID-cloud-builds'
